name: Run Data Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'
  push:
    branches:
      - master

env:
  ATHLETE: lyuiii
  TITLE: lyuiii Running
  MIN_GRID_DISTANCE: 5
  TITLE_GRID: Running Records
  IGNORE_START_END_RANGE: 10
  IGNORE_RANGE: 10
  SAVE_DATA_IN_GITHUB_CACHE: false
  DATA_CACHE_PREFIX: 'track_data'
  BUILD_GH_PAGES: true
  SAVE_TO_PARQENT: false
  GENERATE_MONTH_OF_LIFE: false
  BIRTHDAY_MONTH: 1989-03
  USE_LOCAL_TIME: true

jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm install -g pnpm
          pnpm install

      - name: Sync Strava data
        run: python run_page/strava_sync.py ${{ secrets.STRAVA_CLIENT_ID }} ${{ secrets.STRAVA_CLIENT_SECRET }} ${{ secrets.STRAVA_REFRESH_TOKEN }} --only-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SVG
        run: |
          python run_page/gen_svg.py \
            --title "${{ env.TITLE_GRID }}" \
            --type grid \
            --athlete "${{ env.ATHLETE }}" \
            --output assets/grid.svg \
            --min-distance ${{ env.MIN_GRID_DISTANCE }} \
            --track-color blue \
            --special-distance 10 \
            --special-color yellow \
            --special-distance2 20 \
            --special-color2 red \
            --use-localtime

      - name: Build
        run: PATH_PREFIX=/running_page pnpm run build

      - name: Deploy to GitHub Pages
        if: env.BUILD_GH_PAGES == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
